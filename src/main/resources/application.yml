spring:
  application:
    name: gojjibom-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gojjibom}
    username: ${SPRING_DATASOURCE_USERNAME:gojjibom}
    password: ${SPRING_DATASOURCE_PASSWORD:gojjibom}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  # framework: Spring's ForwardedHeaderFilter honors nginx X-Forwarded-Proto=https,
  # so springdoc emits https server URLs (fixes Swagger mixed-content behind TLS).
  forward-headers-strategy: framework
  tomcat:
    redirect-context-root: false

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  notifications:
    # WP3a missed-dose / escalation engine. Delivery channels (web push / SMS)
    # are WP3b and are NOT wired here.
    missed-grace-min: ${APP_NOTIFICATIONS_MISSED_GRACE_MIN:0}
    scheduler:
      enabled: ${APP_NOTIFICATIONS_SCHEDULER_ENABLED:true}
      fixed-rate-ms: ${APP_NOTIFICATIONS_SCHEDULER_FIXED_RATE_MS:60000}

springdoc:
  paths-to-match:
    - /api/**
  swagger-ui:
    operations-sorter: method
    tags-sorter: alpha
