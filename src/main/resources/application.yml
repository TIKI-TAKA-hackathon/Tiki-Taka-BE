spring:
  application:
    name: gojjibom-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gojjibom}
    username: ${SPRING_DATASOURCE_USERNAME:gojjibom}
    password: ${SPRING_DATASOURCE_PASSWORD:gojjibom}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
