name: Deploy

# Build + verify on every push to main, then deploy to EC2.
#
# Required GitHub secrets (Settings > Secrets and variables > Actions):
#   EC2_HOST     - EC2 public IP or hostname (e.g. 15.164.189.72 or api.stdiodh.xyz)
#   EC2_USER     - SSH user (defaults to "ubuntu" if unset)
#   EC2_SSH_KEY  - private SSH key whose public key is in the server's ~/.ssh/authorized_keys
#
# NOTE: the GHCR package must be PUBLIC, or the EC2 host must run
#   `docker login ghcr.io` with a read (read:packages) token so `docker compose pull` works.
# NOTE: first-time EC2 setup is manual (see DEPLOY.md): clone the repo to ~/Tiki-Taka-BE,
#   create .env, run ./init-letsencrypt.sh once, then the initial `docker compose ... up -d`.

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Verify (lint, static analysis, tests)
        run: ./gradlew ktlintCheck detekt test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/stdiodh/tiki-taka-be:latest
            ghcr.io/stdiodh/tiki-taka-be:${{ github.sha }}

  deploy:
    needs: verify-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER || 'ubuntu' }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Tiki-Taka-BE && git pull &&
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull backend &&
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
