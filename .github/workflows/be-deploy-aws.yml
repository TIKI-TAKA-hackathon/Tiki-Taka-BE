name: BE Deploy AWS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build API
        working-directory: api
        run: ./gradlew clean test build

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/go/go.mod

      - name: Test Go tools
        working-directory: tools/go
        run: go test ./...

      - name: Prepare SSH
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_SSH_PORT: ${{ secrets.AWS_SSH_PORT }}
          AWS_SSH_PRIVATE_KEY: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$AWS_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "$AWS_SSH_PORT" "$AWS_HOST" >> ~/.ssh/known_hosts

      - name: Sync files
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_SSH_PORT: ${{ secrets.AWS_SSH_PORT }}
          AWS_USER: ${{ secrets.AWS_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -p "$AWS_SSH_PORT" "$AWS_USER@$AWS_HOST" "mkdir -p '$DEPLOY_PATH/api' '$DEPLOY_PATH/tools' '$DEPLOY_PATH/infra'"
          rsync -az --delete --exclude '.env' \
            -e "ssh -p $AWS_SSH_PORT" \
            api/ "$AWS_USER@$AWS_HOST:$DEPLOY_PATH/api/"
          rsync -az --delete \
            -e "ssh -p $AWS_SSH_PORT" \
            tools/ "$AWS_USER@$AWS_HOST:$DEPLOY_PATH/tools/"
          rsync -az --delete \
            -e "ssh -p $AWS_SSH_PORT" \
            infra/ "$AWS_USER@$AWS_HOST:$DEPLOY_PATH/infra/"

      - name: Deploy with Docker Compose
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_SSH_PORT: ${{ secrets.AWS_SSH_PORT }}
          AWS_USER: ${{ secrets.AWS_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -p "$AWS_SSH_PORT" "$AWS_USER@$AWS_HOST" \
            "cd '$DEPLOY_PATH/api' && test -f .env || (echo 'Missing $DEPLOY_PATH/api/.env on server' >&2; exit 1)"
          ssh -p "$AWS_SSH_PORT" "$AWS_USER@$AWS_HOST" \
            "cd '$DEPLOY_PATH/api' && docker compose -f docker-compose.prod.yml up -d --build"

      - name: Smoke check
        working-directory: tools/go
        run: go run ./cmd/smokecheck --base-url "${{ secrets.API_BASE_URL }}"
