server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: tikitaka-memory-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/tikitaka}
    username: ${DATABASE_USERNAME:tikitaka}
    password: ${DATABASE_PASSWORD:tikitaka}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  share-token-secret: ${SHARE_TOKEN_SECRET:change-me}
