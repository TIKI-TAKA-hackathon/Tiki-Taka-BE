services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tikitaka
      POSTGRES_USER: tikitaka
      POSTGRES_PASSWORD: tikitaka
    ports:
      - "5432:5432"
    volumes:
      - postgres-local-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tikitaka -d tikitaka"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
    env_file:
      - .env.example
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/tikitaka
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-local-data:
